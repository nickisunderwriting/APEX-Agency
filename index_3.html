<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APEX Agency — Field Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Light theme surfaces */
    --bg:#F7F9FC;            /* page background */
    --surface:#FFFFFF;       /* cards */
    --surface-2:#F1F4F9;     /* subtle raised/inset areas */
    --line:#E4E9F1;          /* hairline borders */
    --line-soft:#EEF1F7;
    --text:#0F1726;          /* primary text */
    --text-soft:#5A6B82;     /* secondary text */
    --text-faint:#8A98AC;    /* tertiary / hints */

    /* Brand accents */
    --blue:#2F6FE3;
    --blue-deep:#1E4FB8;
    --blue-soft:#EAF1FE;
    --gold:#C8972F;
    --gold-deep:#A87C1E;
    --ink:#0E1726;           /* dark accent (buttons, logo bar) */
    --ink-soft:#1B2740;      /* dark accent hover */

    --green:#2E7D52;
    --green-soft:#E6F2EB;
    --red:#C0392B;

    /* Legacy aliases so existing rules keep working on light theme */
    --paper:var(--surface);
    --paper-dim:var(--line);
    --text-on-paper:var(--text);
    --text-soft-on-paper:var(--text-soft);
    --brass:var(--blue);
    --brass-deep:var(--blue-deep);
    --forest:var(--green);
    --forest-soft:var(--green-soft);
    --rust:var(--red);
    --slate:var(--text-soft);
    --slate-dim:var(--text-faint);
    --ink-line:var(--line);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
  a{color:var(--blue);}
  .detail-text a, .how-list a, .script-stage-lines a, .bc-text a{color:var(--blue); font-weight:600; text-decoration:underline;}
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--brass); outline-offset:3px; border-radius:6px;}

  .wrap{max-width:1180px; margin:0 auto; padding:0 24px 80px;}

  .brandbar{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; padding:24px 0 0;}
  .brandmark{display:flex; align-items:center; gap:10px; background:var(--ink); padding:8px 16px; border-radius:14px;}
  .brand-logo-img{height:46px; width:auto; display:block;}
  .mode-toggle{display:flex; gap:4px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:4px; box-shadow:0 1px 2px rgba(16,24,42,0.04);}
  .mode-btn{
    background:transparent; border:none; color:var(--text-soft); font-size:13px; font-weight:500;
    padding:8px 16px; border-radius:11px; cursor:pointer; font-family:inherit; transition:background .15s ease, color .15s ease;
  }
  .mode-btn.active{background:var(--blue); color:#fff; font-weight:600;}

  /* ---------- Header ---------- */
  header.top{
    padding:34px 0 26px;
  }
  .eyebrow{
    font-size:13px;
    font-weight:600;
    color:var(--blue);
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .eyebrow .dot{width:4px;height:4px;border-radius:50%;background:var(--text-faint);}
  h1.title{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(33px, 4.8vw, 52px);
    line-height:1.06;
    margin:10px 0 10px;
    letter-spacing:-0.015em;
    color:var(--text);
  }
  .subtitle{color:var(--text-soft); font-size:15.5px; max-width:560px; line-height:1.6;}

  .head-row{display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap;}

  .mentor-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px 20px;
    min-width:260px;
    position:relative;
    box-shadow:0 1px 2px rgba(16,24,42,0.04), 0 12px 28px -22px rgba(16,24,42,0.25);
  }
  .mentor-card .label{font-size:12px; font-weight:600; color:var(--text-faint); margin-bottom:7px;}
  .mentor-card .name{font-weight:600; font-size:15px;}
  .mentor-card .meta{color:var(--text-soft); font-size:13px; margin-top:3px;}
  .mentor-card .placeholder{color:var(--text-faint); font-size:13px; font-style:italic;}
  .edit-pencil{
    position:absolute; top:12px; right:12px;
    background:none; border:none; color:var(--text-faint); cursor:pointer;
    font-size:13px; padding:4px; border-radius:6px;
  }
  .edit-pencil:hover{color:var(--blue);}

  .edit-panel{
    margin-top:12px; padding-top:12px; border-top:1px solid var(--line);
    display:grid; gap:9px;
  }
  .edit-panel input{
    background:var(--surface-2); border:1px solid var(--line); color:var(--text);
    padding:9px 11px; border-radius:10px; font-size:13px; font-family:inherit; width:100%;
  }
  .edit-panel input:focus{border-color:var(--blue); outline:none; background:#fff;}
  .edit-panel .row-label{font-size:11.5px; color:var(--text-faint); margin-bottom:3px; display:block;}
  .edit-panel .note{font-size:11.5px; color:var(--text-faint); line-height:1.45;}
  .save-btn{
    background:var(--blue); color:#fff; border:none; border-radius:10px;
    padding:9px 15px; font-size:13px; font-weight:600; cursor:pointer; margin-top:4px; transition:background .15s ease;
  }
  .save-btn:hover{background:var(--blue-deep);}
  .save-btn:disabled{background:var(--line); color:var(--text-faint); cursor:not-allowed;}

  /* ---------- Name banner ---------- */
  .name-banner{
    margin-top:18px; background:var(--blue-soft); border:1px solid #D5E3FB;
    border-radius:14px; padding:14px 18px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  }
  .name-banner span{font-size:13.5px; color:var(--text-soft);}
  .name-banner input{
    background:#fff; border:1px solid var(--line); color:var(--text);
    padding:9px 12px; border-radius:10px; font-size:13.5px; font-family:inherit; min-width:180px;
  }
  .name-banner input:focus{border-color:var(--blue); outline:none;}

  /* ---------- Progress trail ---------- */
  .trail-row{margin-top:24px;}
  .trail-stat{
    font-size:13px; font-weight:600; color:var(--blue); font-variant-numeric:tabular-nums;
    display:flex; justify-content:space-between; margin-bottom:8px;
  }
  .trail-track{height:8px; border-radius:6px; background:var(--surface-2); border:1px solid var(--line); overflow:hidden;}
  .trail-fill{height:100%; background:linear-gradient(90deg, var(--blue-deep), var(--blue)); border-radius:6px; transition:width .4s ease;}

  .doc-tracker{margin-top:18px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .doc-tracker-label{font-size:12px; font-weight:600; color:var(--text-faint);}
  .doc-chips{display:flex; gap:8px; flex-wrap:wrap;}
  .doc-chip{
    border:1px solid var(--line); border-radius:20px; background:var(--surface);
    font-size:12px; font-weight:600; padding:6px 12px; cursor:pointer; font-family:inherit; transition:all .15s ease;
    box-shadow:0 1px 1px rgba(16,24,42,0.03);
  }
  .doc-chip.have{color:var(--green); border-color:#BFE0CC; background:var(--green-soft);}
  .doc-chip.missing{color:var(--red); border-color:#F0CFCB; background:#FCEEEC;}
  .doc-chip:hover{filter:brightness(.98); transform:translateY(-1px);}

  /* ---------- Layout: rail + page ---------- */
  .layout{display:grid; grid-template-columns:230px 1fr; gap:28px; margin-top:34px; align-items:start;}
  @media (max-width:780px){ .layout{grid-template-columns:1fr;} }

  .rail{display:flex; flex-direction:column; gap:4px; position:sticky; top:20px;}
  @media (max-width:780px){
    .rail{
      position:static; flex-direction:row; overflow-x:auto; gap:8px;
      padding-bottom:6px; -webkit-overflow-scrolling:touch;
    }
  }
  .rail-tab{
    background:transparent; border:none; text-align:left; cursor:pointer;
    padding:12px 14px; border-radius:13px; color:var(--text-soft);
    display:flex; flex-direction:column; gap:6px;
    transition:background .15s ease, color .15s ease;
  }
  @media (max-width:780px){ .rail-tab{min-width:150px;} }
  .rail-tab:hover{background:var(--surface); color:var(--text);}
  .rail-tab.active{background:var(--blue); color:#fff; box-shadow:0 8px 20px -10px rgba(47,111,227,0.6);}
  .rail-tab .rn{font-size:11.5px; font-weight:600; color:var(--blue); font-variant-numeric:tabular-nums;}
  .rail-tab.active .rn{color:rgba(255,255,255,.8);}
  .rail-tab .rl{font-weight:600; font-size:13.5px;}
  .rail-fillbar{height:3px; background:var(--line); border-radius:3px; overflow:hidden;}
  .rail-tab.active .rail-fillbar{background:rgba(255,255,255,.3);}
  .rail-fillbar i{display:block; height:100%; background:var(--green);}
  .rail-tab.active .rail-fillbar i{background:#fff;}

  /* ---------- Page ---------- */
  .page{
    background:transparent; color:var(--text);
    border-radius:0; padding:0;
  }
  .page-head{padding-bottom:18px; margin-bottom:10px;}
  .page-num{font-size:12px; font-weight:700; color:var(--blue); letter-spacing:.04em; text-transform:uppercase;}
  .page-title{font-family:'Fraunces',serif; font-weight:600; font-size:29px; margin:6px 0 8px; color:var(--text); letter-spacing:-0.01em;}
  .page-blurb{color:var(--text-soft); font-size:14.5px; max-width:620px; line-height:1.6;}

  .spotlight{
    background:var(--green-soft); border-radius:18px; padding:20px 22px; margin:18px 0 8px;
  }
  .spotlight-label{font-size:12px; font-weight:700; color:var(--green); margin-bottom:7px;}
  .spotlight-text{font-size:14.5px; line-height:1.6; margin:0 0 10px; color:var(--text);}
  .spotlight-list{margin:0; padding-left:18px; font-size:14px; line-height:1.65; color:var(--text);}
  .spotlight-list li{margin-bottom:6px;}

  .discord-prompt{
    background:linear-gradient(135deg, #16243C, #0E1726);
    border:1px solid var(--gold); border-radius:20px; padding:22px 24px; margin:16px 0 4px;
    box-shadow:0 18px 40px -24px rgba(14,23,38,0.6);
  }
  .discord-prompt-label{font-size:12px; font-weight:700; color:var(--gold); margin-bottom:8px; letter-spacing:.02em; text-transform:uppercase;}
  .discord-prompt-text{font-size:14.5px; line-height:1.65; margin:0; color:#EAF0FA;}
  .discord-prompt-text a{color:#E2B856; font-weight:600; text-decoration:underline;}
  .discord-prompt-contact{font-size:13.5px; margin:10px 0 0; color:#9FB1CA; font-weight:500;}

  .step{
    background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:4px 20px; margin-bottom:10px;
    box-shadow:0 1px 2px rgba(16,24,42,0.03), 0 10px 24px -20px rgba(16,24,42,0.22);
    transition:box-shadow .15s ease, border-color .15s ease, opacity .15s ease;
  }
  .step:hover{border-color:#D5DEEB;}
  /* Step-by-step focus */
  .step-current{
    border-color:var(--blue); border-width:1.5px;
    box-shadow:0 2px 4px rgba(47,111,227,0.08), 0 16px 32px -20px rgba(47,111,227,0.45);
    padding:8px 22px 6px;
  }
  .step-now-label{
    font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.04em;
    padding-top:10px;
  }
  .step-done{opacity:.62;}
  .step-done:hover{opacity:.85;}
  .step-row{display:flex; align-items:flex-start; gap:14px; padding:16px 0; cursor:pointer;}
  .chk{
    width:23px; height:23px; min-width:23px; border-radius:8px; border:2px solid var(--blue);
    margin-top:1px; display:flex; align-items:center; justify-content:center; cursor:pointer;
    background:transparent; transition:background .15s ease, border-color .15s ease;
  }
  .chk.done{background:var(--green); border-color:var(--green);}
  .chk.done::after{content:"✓"; color:#fff; font-size:13px; font-weight:700;}
  .step-main{flex:1;}
  .step-title{font-weight:600; font-size:15.5px; color:var(--text);}
  .step-title.done{color:var(--text-faint); text-decoration:line-through; text-decoration-color:var(--green);}
  .chev{color:var(--text-faint); font-size:13px; margin-top:3px; transition:transform .2s ease;}
  .chev.open{transform:rotate(90deg);}

  .step-detail{display:none; padding:0 0 18px; max-width:680px;}
  .step-detail.open{display:block;}
  .detail-block{margin-bottom:11px;}
  .detail-label{font-size:11.5px; font-weight:700; color:var(--brass-deep); margin-bottom:4px;}
  .detail-text{font-size:14px; line-height:1.55; color:var(--text-on-paper);}
  .how-list{margin:0; padding-left:18px; font-size:14px; line-height:1.6; color:var(--text-on-paper);}
  .how-list li{margin-bottom:3px;}
  textarea.note-field{
    width:100%; margin-top:8px; border:1px solid var(--paper-dim); background:#FAFBFD;
    border-radius:12px; padding:9px 12px; font-family:inherit; font-size:13.5px; resize:vertical; min-height:46px;
  }
  .note-hint{font-size:11px; color:var(--text-soft-on-paper); margin-top:4px;}

  .page-footer{margin-top:18px; padding-top:18px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
  .footer-nav-btn{
    background:var(--ink); color:#fff; border:none; padding:11px 18px; border-radius:12px;
    font-size:13.5px; font-weight:600; cursor:pointer; transition:background .15s ease;
  }
  .footer-nav-btn:hover{background:var(--ink-soft);}
  .reset-link{background:none; border:none; color:var(--red); font-size:12.5px; cursor:pointer; text-decoration:underline;}

  .loading{display:flex; align-items:center; justify-content:center; min-height:60vh; color:var(--text-soft); font-size:13.5px;}

  /* Training Library */
  .script-layout{display:grid; grid-template-columns:210px 1fr; gap:24px;}
  @media (max-width:680px){ .script-layout{grid-template-columns:1fr;} }
  .script-list{display:flex; flex-direction:column; gap:6px;}
  .script-list-btn{
    text-align:left; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; font-size:13.5px; font-weight:600; color:var(--text-soft); cursor:pointer; transition:all .15s ease;
  }
  .script-list-btn:hover{border-color:#D5DEEB; color:var(--text);}
  .script-list-btn.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .script-detail-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:8px;}
  .script-title{font-family:'Fraunces',serif; font-weight:600; font-size:23px; margin:0 0 5px; color:var(--text);}
  .script-subtitle{color:var(--text-soft); font-size:13.5px; margin:0; max-width:480px; line-height:1.55;}
  .script-stage{display:flex; gap:14px; padding:16px 18px; background:var(--surface); border:1px solid var(--line); border-radius:16px; margin-bottom:8px; box-shadow:0 1px 2px rgba(16,24,42,0.03);}
  .script-stage-num{font-size:13px; font-weight:700; color:var(--blue); min-width:22px; font-variant-numeric:tabular-nums;}
  .script-stage-title{font-weight:600; font-size:14.5px; margin-bottom:7px;}
  .script-stage-lines{margin:0; padding-left:18px; font-size:14px; line-height:1.6; color:var(--text);}
  .script-stage-lines li{margin-bottom:5px;}

  .objection-filterbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .filter-chip{
    background:#fff; border:1px solid var(--paper-dim); border-radius:20px; padding:7px 14px;
    font-size:12.5px; font-weight:600; color:var(--text-soft-on-paper); cursor:pointer; transition:all .15s ease;
  }
  .filter-chip.active{background:var(--brass); border-color:var(--brass); color:#fff;}
  .objection-count{margin-left:auto; font-size:12px; font-weight:500; color:var(--text-soft-on-paper); font-variant-numeric:tabular-nums;}
  .objection-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  @media (max-width:680px){ .objection-grid{grid-template-columns:1fr;} }
  .objection-card{
    border:1px solid var(--line); border-radius:18px; padding:16px 18px; cursor:pointer; background:var(--surface);
    box-shadow:0 1px 2px rgba(16,24,42,0.03), 0 10px 24px -20px rgba(16,24,42,0.22);
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .objection-card:hover{border-color:#D5DEEB;}
  .objection-card.open{border-color:var(--blue); box-shadow:0 0 0 1px var(--blue), 0 10px 24px -18px rgba(47,111,227,0.4); grid-column:1/-1;}
  .objection-tag{font-size:11px; font-weight:700; color:var(--blue); margin-bottom:7px; text-transform:uppercase; letter-spacing:.02em;}
  .objection-text{font-weight:600; font-size:14.5px; color:var(--text);}
  .objection-hint{font-size:12px; color:var(--text-faint); margin-top:8px;}
  .objection-rebuttal{font-size:13.5px; line-height:1.6; margin-top:10px; color:var(--text);}
  .objection-tip{font-size:13px; line-height:1.55; margin-top:8px; color:var(--text-soft);}

  .quiz-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  @media (max-width:780px){ .quiz-grid{grid-template-columns:1fr;} }
  .quiz-card{
    border:1px solid var(--line); border-radius:20px; padding:22px; display:flex; flex-direction:column; gap:8px; background:var(--surface);
    box-shadow:0 1px 2px rgba(16,24,42,0.03), 0 10px 24px -20px rgba(16,24,42,0.22);
  }
  .quiz-card-title{font-family:'Fraunces',serif; font-weight:600; font-size:18px; color:var(--text);}
  .quiz-card-meta{font-size:12.5px; color:var(--text-soft);}
  .quiz-card-result{font-size:12.5px; font-weight:600; padding:4px 0;}
  .quiz-card-result.pass{color:var(--green);}
  .quiz-card-result.fail{color:var(--red);}
  .quiz-card-result.none{color:var(--text-faint);}
  .quiz-question{padding:18px 20px; background:var(--surface); border:1px solid var(--line); border-radius:16px; margin-bottom:8px;}
  .quiz-question-text{font-weight:600; font-size:14.5px; margin-bottom:11px; color:var(--text);}
  .quiz-options{display:flex; flex-direction:column; gap:8px;}
  .quiz-option{
    text-align:left; background:var(--surface-2); border:1px solid var(--line); border-radius:12px;
    padding:11px 14px; font-size:13.5px; cursor:pointer; font-family:inherit; transition:all .15s ease; color:var(--text);
  }
  .quiz-option:hover{border-color:#C8D4E6;}
  .quiz-option.selected{border-color:var(--blue); background:var(--blue-soft);}
  .quiz-option.reviewed{cursor:default;}
  .quiz-option.correct{border-color:var(--green); background:var(--green-soft); font-weight:600;}
  .quiz-option.incorrect{border-color:var(--red); background:#FCEEEC;}
  .obj-video-banner{display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:var(--blue-soft); border:1px solid #D5E3FB; border-radius:14px; padding:13px 18px; margin-bottom:16px; font-size:13.5px; color:var(--text);}
  .obj-video-banner a{background:var(--ink); color:#fff; padding:9px 14px; border-radius:10px; font-weight:600; text-decoration:none; font-size:13px;}
  .obj-video-banner a:hover{background:var(--ink-soft);}

  .quiz-explain{font-size:13px; color:var(--text-soft); margin-top:9px; line-height:1.55;}

  .daily-bar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:var(--blue-soft); border:1px solid #D5E3FB; border-radius:14px; padding:12px 18px; margin:14px 0 16px; font-size:13.5px; font-weight:600; color:var(--text);}

  /* Bootcamp */
  .bc-section{margin-top:24px;}
  .bc-section-title{font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin-bottom:12px; color:var(--text);}
  .bc-text{font-size:14px; line-height:1.65; color:var(--text); margin:0 0 8px;}
  .bc-muted{color:var(--text-soft); font-size:13px;}
  .bc-card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-bottom:10px; box-shadow:0 1px 2px rgba(16,24,42,0.03), 0 10px 24px -20px rgba(16,24,42,0.22);}
  .bc-card-head{display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap;}
  .bc-card-name{font-weight:700; font-size:15px; margin-bottom:6px; color:var(--text);}
  .bc-card-ages{font-size:12px; color:var(--blue); font-weight:600;}
  .bc-cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:6px 0;}
  @media (max-width:600px){ .bc-cols{grid-template-columns:1fr;} }
  .bc-col-label{font-size:11.5px; font-weight:700; color:var(--blue); margin:8px 0 4px;}
  .bc-col-label.bc-pos{color:var(--green);}
  .bc-col-label.bc-neg{color:var(--red);}

          '(If keep + can\'t afford): How long could they realistically stay in the home? That would put pressure on them quickly, right? So you want a plan in place so they\'re not dealing with all these bills on top of the loss — does that sound right?',
          '(If sell): So you want them to have the leverage to sell on their own terms, not the bank\'s 90-day terms — keeping as much equity as possible. Does that sound right?',
          'Golden question — ask it, then go quiet and let them answer: do you see having a plan in place to take care of the mortgage for them as a necessity, or just a luxury?',
          '(If luxury): Earlier you said it would be difficult for your beneficiary if your income stopped — if that were their situation, would this really be a luxury, or something they\'d actually need? (Then stay silent.)',
          '(If necessity): I agree — especially since you mentioned it would be difficult for them to handle the mortgage alone. That\'s exactly why we\'re putting something structured in place, so they\'re protected, not pressured.']},
        {title:'Clarify how mortgage protection works', lines:[
          'There are two common structures: PAYOFF plans, which pay off the home entirely, and PAYMENT plans, which cover the mortgage payment for a set period so the family has time to make a plan.',
          '(If they only qualify for a payment/equity-protection plan): Do you think the bank would call your beneficiary and say "we\'re so sorry, take the next two years to grieve and we\'ll cover your payment"? They never would — but you can set that up for them. That\'s what a payment plan does.',
          '(If they push back on a payment plan instead of full payoff): My goal isn\'t to get you over-insured. I could get you a full payoff, but it would cost more than makes sense based on what we discussed — most clients in your situation go with the payment plan because it\'s cheaper, easier to qualify for, and still protects your equity. Does that make sense?']},
        {title:'Present the options', lines:[
          'I\'ve narrowed this down to 3–4 companies and I\'m comparing quality and rate to find the best fit. Grab your pen and paper. Full transparency — I don\'t care if it costs $5 a month or $500, I care about finding something that fits your budget comfortably. If anything I show you feels like too much, tell me and I\'ll go back and pull other options.',
          'Build value in the carrier — name the company, mention its rating and how long it\'s been around.',
          'Build value in the policy — explain the relevant living benefits (pays out while living for critical/chronic/terminal illness), that it never expires once active and the price is locked for good, and if applicable, that it builds cash value you can borrow against later.',
          'If quoting term: explain that it locks in the rate with no increases, plus living benefits. If quoting a return-of-premium/cash-back term: explain that if nothing happens, 100% of every dollar paid is returned at the end of the term.',
          'I can\'t guarantee approval — that\'s up to the carrier — but if you answer every question accurately, I\'m comfortable saying you have a strong shot. Which of these options would you like to try to get approved for?']},
        {title:'Start the application', lines:[
          'I\'ll need three things the carrier requires: your driver\'s license, your Social Security number, and your banking information.',
          'Driver\'s license: the carrier runs a quick background check — please text a photo of just the front to the number I sent my license from.',
          'Social Security number / MIB release: this gives the carrier permission to verify your medical history through the Medical Information Bureau, since nobody is coming out to test you directly. (If hesitant: walk through why this is required and that there\'s no way to submit an application without it.)',
          'Banking: confirm who the payor is. You\'re not paying anything today since you\'re not approved yet — carriers just need to validate that the payor has active banking in their name, to prevent fraud. Which bank do you use? (Look up the routing number for that bank/state and read it back to confirm, then confirm the account number.)',
          '(If they push back on banking): Your routing and account numbers are the same information printed on the bottom of a check — that information alone can\'t be used to take money from your account without your authorization and signature.']},
        {title:'Lock it down', lines:[
          'That was successfully submitted. I\'m going to close out your file — tomorrow I\'ll have it formally closed out with the department of insurance and financial services. The state only assigns one underwriter and one ad per household, so don\'t be surprised if you keep getting similar-looking ads afterward — those aren\'t from us. Don\'t fill those out; if anyone follows up, just tell them you\'ve already been taken care of and give them my name.',
          'If anyone tells you your policy is "outdated" or "needs review," that\'s not valid — there\'s no such thing once it\'s submitted. Get their number and send it to me so I can have them stop calling you.',
          'You\'re not paying anything today — the initial premium starts once you\'re approved. When you see that draft from [carrier], that\'s actually good news: it means you\'re covered as of that moment. After that, you can choose between the 1st and the 28th for your ongoing draft date.',
          'You\'re all set unless you have any other questions — it\'s been a pleasure helping you today.']},
      ]
    },
    {
      id:'review', product:'mp', title:'Policy Review — Existing Coverage (Compliant)',
      subtitle:'For a prospect who already has coverage. This is an honest second-look offer — never tell someone their policy is "expired," "outdated," or "due for review" when you don\'t actually know that. Misrepresenting an existing policy to induce a switch is a regulated violation.',
      stages:[
        {title:'Ground rule — read this first', lines:[
          'You are offering a free comparison, not declaring their policy defective. Do not say their policy is "up for review," "expired," or "needs updating" unless you have verified facts that make that true.',
          'If their current policy is genuinely better, your job is to tell them so. That honesty is what earns trust, referrals, and a clean compliance record.',
          'Replacing an existing policy triggers formal replacement-disclosure rules. If a replacement is genuinely warranted, follow your carrier\'s and Florida\'s replacement procedures — don\'t skip them.']},
        {title:'Honest opener', lines:[
          'I\'m not calling to tell you anything\'s wrong with what you have. A lot of people just haven\'t had their coverage looked at since they first got it, and both rates and products change over time.',
          'Would you be open to a free second look? If you\'re already in a great spot, I\'ll tell you straight and you\'ll have peace of mind. If there\'s a genuinely better fit, I\'ll show you the difference side by side and you decide. No pressure either way.']},
        {title:'Gather their current coverage', lines:[
          'To compare fairly, what do you currently have — is it term, whole life, or mortgage protection specifically?',
          'Do you know the coverage amount, what you\'re paying monthly, and which carrier it\'s with?',
          'Roughly when did you put it in place? And what did you originally set it up to do for your family?']},
        {title:'Do an honest comparison', lines:[
          'Run a real comparison against what you can offer — coverage amount, premium, living benefits, and policy type.',
          'If their current policy is equal or better, say so plainly: "Honestly, what you have is solid — I wouldn\'t change it." That call builds more long-term business than a forced switch ever will.',
          'Only continue toward a new policy if you can show a genuine, factual improvement.']},
        {title:'If a better option genuinely exists', lines:[
          'Based on what you shared, here\'s what your current plan does, and here\'s what this option would do — let\'s put them side by side so you can see the actual difference in price and benefits.',
          'Be specific and factual: don\'t inflate the gap, don\'t guess at their current policy\'s terms, and let the real numbers make the case.',
          'You\'re choosing between these with full information — which one makes more sense for your family?']},
        {title:'If they decide to switch — do it right', lines:[
          'Because this would replace an existing policy, there are some required disclosures I\'ll walk you through — this protects you.',
          'Important: do not cancel your current policy until the new one is fully approved and in force. We never want a gap in coverage.',
          'Complete the carrier\'s replacement paperwork honestly and keep the client covered the entire time.']},
      ]

  const OBJECTIONS = [
    {id:'o1', stage:'intro', product:'mp', text:'"I\'m no longer interested."',
      rebuttal:'Okay, and I know this was initially important to you, like it is for every family that sends back the request. Are you no longer interested because you don\'t believe you can afford it, or you don\'t think you\'ll qualify?',
      tip:'Don\'t take it at face value — isolate which real objection (price or qualifying) is underneath it, then go straight back into the script.'},
    {id:'o2', stage:'intro', product:'mp', text:'"Not interested, take me off the list!"',
      rebuttal:'I\'m not a salesperson and don\'t have a list. I\'m a field underwriter, and my job is to get the information you requested out to you to release us of liability — what you do with that is up to you. I\'ll be servicing your area today and tomorrow, so let\'s find a 15–20 minute window for a virtual meeting so I can get these options to you. First, let me verify my info — I have your address as ______.',
      tip:'Reframe the call as your job, not a sales pitch, then move straight into booking.'},
    {id:'o3', stage:'intro', product:'mp', text:'"I don\'t have time this week, call me back next week."',
      rebuttal:'Perfect, I understand being busy. For the next couple of weeks they have me managing several counties since we\'re behind. I know this is important to your family, so let me write some notes to accommodate you. What time are you typically in the door from work? And your spouse? I\'m completely booked, but I\'d want to meet with you both and go over your options — it takes about 15–20 minutes. How does today or tomorrow work at ______?',
      tip:'Don\'t accept "next week" — narrow it down to a real day and time before you hang up.'},
    {id:'o4', stage:'intro', product:'mp', text:'"I got to go, call me back later."',
      rebuttal:'Perfect, I\'m leaving the office myself and don\'t have time right now either. I\'m calling to schedule a time to get back to you — this will only take a minute. What time are you typically back from work? Is this for just you, or is there a significant other who helps with the mortgage? I don\'t have that exact time, but I\'ll put you down for ______ — can you give me a window between ______ and ______? We\'ll meet then to go over 5 minutes of health questions and your options. Are you familiar with Zoom?',
      tip:'Keep it to one minute, get a real time on the calendar, and confirm the appointment method before you let them go.'},
    {id:'o5', stage:'intro', product:'mp', text:'"I can\'t afford it."',
      rebuttal:'I\'m a field underwriter, not a salesperson — I have access to state-approved programs, and honestly I\'ve never been unable to help someone protect their family because it wasn\'t affordable. Let\'s find a 15–20 minute window for a virtual meeting so I can get the actual options in front of you. First, let me verify my info — I have your address as ______.',
      tip:'Don\'t quote a price on this call — the goal is the appointment, not a number.'},
    {id:'o6', stage:'intro', product:'mp', text:'"How much is it going to cost? Can you mail it to me?"',
      rebuttal:'I\'d love to, but honestly I have no idea what you qualify for yet. These are state-approved programs — no physical exam, no nurse — all they do is verify your ID and ask about 5 minutes of health questions to find out what you qualify for. Let\'s find a 15–20 minute window for a virtual meeting. First, let me verify my info — I have your address as ______.',
      tip:'Don\'t guess at pricing over the phone — every quote depends on real health answers, which is exactly why you need the appointment.'},
    {id:'o7', stage:'intro', product:'mp', text:'"We already got it taken care of."',
      rebuttal:'Perfect — since this request isn\'t showing as taken care of in my system, you either have an outdated plan that\'s probably costing you more than it should, or you\'re due for a policy review. I can take 5–10 minutes to review it and see if we can get your premium lowered and your benefits updated. What\'s better — mornings, afternoons, or evenings?',
      tip:'Treat "already covered" as a reason to review, not a reason to give up the call.'},
    {id:'o8', stage:'intro', product:'mp', text:'"I\'m already meeting with another agent this week."',
      rebuttal:'Perfect — most families send back multiple requests to compare and make sure they get the best plan. Is it fair to assume you did the same? I\'m the Senior Field Underwriter for your county with access to state-approved pricing, which is usually lower than what an outside sales agent will quote. Let\'s find a 15–20 minute window before that other appointment so you have something to compare it to.',
      tip:'Try to book before the other agent\'s appointment, not after — being second means you\'re the one being compared.'},
    {id:'o9', stage:'intro', product:'mp', text:'"I don\'t think I can qualify."',
      rebuttal:'I completely understand, but I\'m a field underwriter, not a salesperson — I have access to state-approved programs and dozens of carriers, and I can help almost anyone qualify, regardless of health history. Let\'s find a 15–20 minute window for a virtual meeting so we can actually find out instead of guessing.',
      tip:'Don\'t let them self-reject — the only way to know is the appointment.'},
    {id:'o10', stage:'intro', product:'mp', text:'"My mortgage is paid off."',
      rebuttal:'That\'s great, congratulations! That actually makes you eligible for other state-regulated programs with a tax-free benefit — life insurance and final expense coverage for burial costs. I have access to dozens of A-rated carriers and can usually put families in better plans. What do you currently have in place?',
      tip:'A paid-off mortgage isn\'t a dead end — pivot straight into final expense or life.'},
    {id:'o11', stage:'intro', product:'mp', text:'"I have coverage through the Military."',
      rebuttal:'You\'ll likely get disability when you retire — and once that happens, many carriers won\'t qualify you. VA rates also go up every five years, and most veterans don\'t realize that until it\'s too late. That\'s exactly why most of our military families still want this protection in place.',
      tip:'Don\'t argue against VA/military coverage — point out the gap it doesn\'t cover.'},
    {id:'o12', stage:'intro', product:'mp', text:'"I don\'t remember filling this out."',
      rebuttal:'No worries — to refresh your memory, you put down your date of birth as ______, and your address as ______, is that correct?',
      tip:'Acknowledge it briefly, confirm a couple of real details, then move straight back into the script.'},
    {id:'o13a', stage:'intro', product:'mp', text:'"I\'ve gotten multiple calls about this."',
      rebuttal:'Yes, most families do — it\'s typical to send back a couple of requests to compare and make sure they get the best plan. I\'m a field underwriter, not a sales rep, so I work with dozens of carriers to find the best fit. I have appointments today and tomorrow, but I can fit you in between them.',
      tip:'Normalize it — multiple calls means they\'re a real, interested lead, not an annoyance.'},
    {id:'o13b', stage:'intro', product:'mp', text:'"Who do you work for? / Which company in particular?"',
      rebuttal:'I\'m independently licensed and appointed by the state — your request is routed to me because I\'m a field underwriter partnered with all of the carriers that offer mortgage protection, not one specific company.',
      tip:'Lead with your independent/state-licensed status before naming any carrier.'},
    {id:'fe1', stage:'closing', product:'fe', text:'"I\'m on a fixed income — will the premium go up later?"',
      rebuttal:'No — once you\'re approved, this is a whole life policy, so your premium is locked in for life. It never goes up, even as you get older, and the coverage never decreases. The number we agree on today is the number you pay, period.',
      tip:'This is a factual fear, not real resistance — answer it plainly and confidently, then go right back to the close.'},
    {id:'fe2', stage:'closing', product:'fe', text:'"My kids are grown, they don\'t need anything from me."',
      rebuttal:'I hear that a lot — but this isn\'t about leaving them an inheritance. When you pass, someone still has to pay for the funeral, and that runs several thousand dollars. This is about that bill not landing on their kitchen table while they\'re grieving. It\'s a gift of not having to scramble, not a payday.',
      tip:'Reframe from "providing for them" to "not burdening them" — that\'s the real emotional driver for final expense.'},
    {id:'fe3', stage:'closing', product:'fe', text:'"I already have a little something through my bank / a burial plan."',
      rebuttal:'That\'s a good start — can I ask how much it\'s for? A lot of those plans are smaller than people remember, and burial costs have climbed a lot in the last few years. We can take a quick look and either confirm you\'re fully covered or fill the gap so your family isn\'t coming out of pocket for the difference.',
      tip:'Don\'t attack the existing plan — get the actual number, since it\'s almost always less than the real cost today.'},
    {id:'fe4', stage:'closing', product:'fe', text:'"Let me think about it / talk to my family first."',
      rebuttal:'That\'s completely fair, this is an important decision. Can I ask — is it the monthly amount you want to think over, or the coverage amount? Because the one thing that changes while you wait is your health, and that\'s what decides the rate. We can lock today\'s rate in now, and you\'ve still got time to review the policy before it\'s final.',
      tip:'Isolate whether it\'s really the price or the coverage — and remind them that health, not time, is what affects the rate.'},
    {id:'fe5', stage:'closing', product:'fe', text:'"I can\'t afford another monthly bill."',
      rebuttal:'I completely understand, and I\'d never put you in something that strains your budget — that\'s actually why I asked about your income earlier. Let\'s look at a coverage amount that fits comfortably. Even a smaller policy means your family isn\'t paying out of pocket, and that\'s the whole point. What number would feel comfortable for you each month?',
      tip:'Requote down to a comfortable amount instead of walking — a small policy placed beats a big one declined.'},
    {id:'life1', stage:'closing', product:'life', text:'"I already have coverage through my job."',
      rebuttal:'That\'s a great start — but that coverage usually disappears the day you leave or lose that job, and it\'s often only one or two times your salary, which doesn\'t go very far. This is coverage you own that follows you regardless of where you work. It\'s not replacing your work policy, it\'s making sure you\'re not left with nothing if that job ever ends.',
      tip:'Most people don\'t know their actual work coverage amount or that it ends with the job — surface both.'},
    {id:'life2', stage:'closing', product:'life', text:'"I\'m young and healthy, I don\'t need this yet."',
      rebuttal:'Honestly, that\'s exactly why now is the best time. Young and healthy is when the rate is at its absolute lowest, and you can lock that in for the life of the policy. Waiting doesn\'t save you money — it just means paying more later, and that\'s assuming your health stays exactly the same. We\'re not insuring you because something\'s wrong, we\'re locking in the best price you\'ll ever get.',
      tip:'Flip "I don\'t need it yet" into "this is the cheapest it\'ll ever be" — make waiting the expensive choice.'},
    {id:'life3', stage:'closing', product:'life', text:'"Insurance feels like a waste — I\'m betting against myself."',
      rebuttal:'I get why it can feel that way, but think of it less like a bet and more like a seatbelt. You don\'t wear it expecting a crash — you wear it so the people in the car with you are protected if one happens. This isn\'t about you, it\'s about your family not inheriting a financial mess on top of losing you.',
      tip:'Use a concrete metaphor (seatbelt) and pivot the focus from them to the people who depend on them.'},
    {id:'life4', stage:'closing', product:'life', text:'"Let me talk to my spouse before I decide anything."',
      rebuttal:'Absolutely, this is a decision that affects both of you — and honestly your spouse is exactly who this is designed to protect. Are they around right now? We could get them on the line for two minutes so you\'re both on the same page, or I can lock today\'s rate in and hold the paperwork until you\'ve had a chance to talk it through tonight.',
      tip:'Offer the quick three-way call first — most spouse objections disappear once the spouse is actually on the phone.'},
    {id:'life5', stage:'closing', product:'life', text:'"How do I know how much coverage I even need?"',
      rebuttal:'Great question, and that\'s exactly my job. We start by looking at what would need to be covered if your income stopped — the mortgage, any debts, and how many years your family would need support. A common starting point is around ten times your income, but we\'ll build it around your actual situation, not a generic number. Want to walk through it together right now?',
      tip:'Turn the uncertainty into an invitation — walking through the needs analysis is itself the close.'},

    /* ---- Master Objection Sheet: Intro-stage ---- */
    {id:'m1', stage:'intro', product:'general', text:'"Not interested." (intro)',
      rebuttal:'No worries — your file just came up as unresolved, let me fill out a few of these questions so people stop calling you. When you were looking into the state\'s options, was it mainly for funeral and final expense coverage, or to cover a mortgage instead? This is brief — I\'m just in charge of helping you shop about 50 companies to see where your actual rates come in. Do you have a pen and paper, and I\'ll shoot you my state ID info real quick?',
      tip:'Stay assumptive — give them a reason the call benefits them (stops other calls), then route into qualifying with a product question.'},
    {id:'m2', stage:'intro', product:'general', text:'"I\'m already covered." (intro)',
      rebuttal:'That\'s actually the purpose of my call — to confirm, are you talking about a policy you just put in place, or one from the last few years? (Recent): Perfect, makes my job easier — let\'s do a quick 5-minute rate check to confirm you\'re placed correctly, then I\'ll update your request as closed. (Old): Got it — were you on the hunt for something smaller, like 20–40k, or did you have something else in mind?',
      tip:'Split "old" vs "recent" coverage — a recent policy gets a "rate check," an old one gets re-shopped. Either way you stay in the conversation.'},
    {id:'m3', stage:'intro', product:'general', text:'"If I\'m placed correctly, why check?" (push-back)',
      rebuttal:'I have this conversation daily where clients were promised they had the best option, and about half the time there are multiple lower options. If you\'re placed correctly, it\'s actually illegal for us to move you into a worse policy — so this is just a second set of eyes for your own peace of mind, and then I\'ll update and close this out to prevent more calls. Is that fair?',
      tip:'Frame the review as risk-free (legally can\'t make it worse) and as the thing that stops the other calls.'},
    {id:'m4', stage:'intro', product:'general', text:'"I\'m busy." (intro)',
      rebuttal:'Same here — I\'m just catching you between appointments myself, and I don\'t want to waste either of our time. You did put down [DOB] and you\'re in [state], correct? And just before I let you go — was this mainly for funeral and final expense, or to cover something else?',
      tip:'"Busy" is usually a smokescreen — keep asking assumptive questions. They wouldn\'t have picked up a random number if they were truly slammed. Only set a soft appointment if it\'s clearly genuine.'},
    {id:'m5', stage:'intro', product:'general', text:'"I didn\'t fill anything out." (intro)',
      rebuttal:'I\'m just as confused as you are — it looks like you listed your beneficiary as ______ and you\'re in the state of ______, is that right? And just before I let you go, was this initially for final expense, to cover a mortgage, or to leave something behind? (If push-back): Oh — you mean you already got this knocked out and just haven\'t received the paperwork yet, or never got the approval notice?',
      tip:'Confirm a real detail (beneficiary, state) to move past the "didn\'t fill out" wall, then route into qualifying.'},

    /* ---- Master Objection Sheet: Closing-stage ---- */
    {id:'m6', stage:'closing', product:'general', text:'"I need to think about it." (closing)',
      rebuttal:'Completely understand. Now, no payment is made today because the carrier first has to confirm you\'re eligible — same as applying for a loan at a bank, they approve you before anything happens. My only job today is making sure the carrier will accept you for the baseline recommendation. And this isn\'t like a phone contract locking you in for 24 months — you can raise or lower coverage anytime with one call. So let\'s make this a no-brainer: start with the bottom option, and if we need to go up later, just let me know.',
      tip:'Reframe today as "just getting approved," remove the lock-in fear, then drop to the bottom option to make saying yes easy.'},
    {id:'m7', stage:'closing', product:'general', text:'"I need to talk to someone first." (closing)',
      rebuttal:'Of course — and they\'ll probably want to know the details, so what we do is send it in for your bare minimum to cover your bases, and once the paperwork comes you can review it together and adjust over the next month if needed. Most people won\'t be upset about some extra money left behind — but they\'d definitely be upset if there was nothing. So let\'s start at the lower option, run it by them, and if they\'re mad you didn\'t get enough, call me and we\'ll bump it up. Sound good?',
      tip:'Let them start low and "run it by" the other person — the policy is placed now and adjustable later, instead of lost to a callback.'},
    {id:'m8', stage:'closing', product:'general', text:'"Can you just email me all this?" (closing)',
      rebuttal:'Yeah, of course — once you\'re approved, the carrier emails and mails you the full policy packet with all the black-and-white details. Right now we just need to figure out which option makes sense as a starting point so we can get the offer back, and then you\'ll have a 30-day window to read everything and make any adjustments.',
      tip:'"Email me" is usually a soft no — acknowledge it, then pivot to picking a starting option so the application still goes in.'},
    {id:'m9', stage:'closing', product:'general', text:'"That\'s too expensive." (closing)',
      rebuttal:'I understand — in a perfect world we\'d all leave our family a million dollars for $20 a month. But insurance is regulated by age and health, so your rate at [age] is going to look different than a 22-year-old\'s. At the end of the day, though, you mentioned [beneficiary] would be in a tough spot if you passed, right? Let\'s send it in for that bottom option — at least they\'ll have some help instead of none. Sound good?',
      tip:'Don\'t defend the price — re-anchor on their stated "why," then requote down to the bottom option.'},
    {id:'m10', stage:'closing', product:'general', text:'"I\'ll just save the money instead." (closing)',
      rebuttal:'You absolutely should keep saving — but what most people do is split the risk. Because if something unexpected happens next month or next year, the policy pays out way more than you could have saved on your own. So let\'s start with the lower option: even if you make just one payment and something happens, the carrier pays the full benefit, no questions asked. Make sense?',
      tip:'Don\'t argue against saving — position insurance as splitting risk, and use the "one payment, full benefit" math to make starting now obvious.'},

    /* ---- Master Objection Sheet: In-Application stage ---- */
    {id:'m11', stage:'inapp', product:'general', text:'"I don\'t want to give that info." (application)',
      rebuttal:'Totally understand — this is just like when you got your car insurance. The carrier requires this on the application to know who they\'re insuring; without it, you can\'t get coverage anywhere. (If still hesitant): You did get my card with my license number — pull up your texts real quick. That 8-digit number under my name is my National Producer Number, issued after federal background checks and fingerprinting. We can even call the Department of Insurance to verify me, and I\'ll send my hard-copy ID with the state seal. I\'m extremely easy to track down.',
      tip:'Normalize the request (car insurance), then rebuild trust with your license/NPN and an offer to verify you — don\'t get defensive.'},
    {id:'m12', stage:'inapp', product:'general', text:'"I don\'t want to give my Social." (application)',
      rebuttal:'I understand — but without your Social, the carrier has no way to validate your medical history, and you can\'t get insurance anywhere without it. The whole policy is tied to you, so when you pass they can confirm it\'s you and pay your beneficiary. (Still no): You got my license number by text — that\'s my NPN, issued after federal background checks. Would it help if we hopped on a quick FaceTime or Zoom so you can see I\'m just a regular insurance agent and a real person?',
      tip:'Tie the Social to protecting the beneficiary\'s payout, then offer face-to-face verification to close the trust gap.'},
    {id:'m13', stage:'inapp', product:'general', text:'"I don\'t have my banking info / don\'t want to give it." (application)',
      rebuttal:'Not a problem — grab a check or bank statement, it\'s right on there, just like buying Girl Scout cookies. (Can\'t find it): Pull up your mobile banking app, or we can call your bank directly — who do you bank with? Remember, nothing drafts until after you\'re approved; the carrier just requires it on the application, same as your car insurance. I can even pull up your routing number in our system and read it off for you to confirm.',
      tip:'Offer multiple easy paths (check, app, call the bank, look up routing) and remind them nothing drafts until approval.'},
    {id:'m14', stage:'inapp', product:'general', text:'"It can\'t charge me yet — I get paid later." (application)',
      rebuttal:'Not a problem — are you normally paid on the 1st, 3rd, or every Friday? Nothing is charged today since you\'re not approved yet; it takes a couple of days to approve, then they draft the initial premium so you\'re covered immediately. If the timing\'s tight, I can send it in as a pending hold until [date] — so you\'d be live on that date, no draft before then. Would that help?',
      tip:'Solve the timing instead of losing the sale — offer a pending hold to their payday so the application still goes in today.'},
  ];

  // Escape HTML, then turn any bare http(s) URL into a clickable link.
  // Safe because escaping happens first; only the matched URL substring becomes an anchor.
  function linkify(str){
    const escaped = escapeHtml(str);
    return escaped.replace(/(https?:\/\/[^\s<]+)/g, function(url){
      // strip a trailing period/paren that's likely punctuation, not part of the URL
      let trail = '';
      const m = url.match(/[).,]+$/);
      if(m){ trail = url.slice(url.length - m[0].length); url = url.slice(0, url.length - m[0].length); }
      return `<a href="${url}" target="_blank" rel="noopener">${url}</a>${trail}`;
    });
  }

  function renderDailyTab(){
    const doneToday = DAILY_CHECKLIST.filter(d=>dailyChecks[d.id]).length;
    return `
      <h3 class="script-title">Daily Checklist</h3>
      <p class="script-subtitle">Your daily activity during the eager period. Run this every day — check items off as you go, then reset it tomorrow morning and do it again. Consistency here is what produces your first sale.</p>
      <div class="daily-bar">

        <button class="reset-link" id="resetDailyBtn">Reset for a new day</button>

        const done = !!dailyChecks[d.id];

        return `
        <div class="step ${done?'step-done':''}">
          <div class="step-row" data-dailytoggle="${d.id}">
            <button class="chk ${done?'done':''}" data-dailycheck="${d.id}" aria-label="Mark done"></button>

            </div>
            <div class="bc-col">
              <div class="bc-col-label">Builder Contracts (total hierarchy)</div>
              <table class="bc-table">${L.builder.map(r=>`<tr><td class="bc-lvl">${r.level}</td><td>${escapeHtml(r.ip)}</td></tr>`).join('')}</table>
            </div>
          </div>
          <p class="bc-text bc-muted">${escapeHtml(L.note)}</p>
        </div>
      </div>
    `;
  }

  function renderScriptsTab(){
    const script = SCRIPTS.find(s=>s.id===activeScriptId) || SCRIPTS[0];
    return `
      <div class="script-layout">
        <div class="script-list">
          ${SCRIPTS.map(s=>`<button class="script-list-btn ${s.id===activeScriptId?'active':''}" data-script="${s.id}">${escapeHtml(s.title)}</button>`).join('')}
        </div>
        <div class="script-detail">
          <div class="script-detail-head">
            <div>
              <h3 class="script-title">${escapeHtml(script.title)}</h3>
              <p class="script-subtitle">${escapeHtml(script.subtitle)}</p>
            </div>
            <button class="footer-nav-btn" data-scriptdownload="${script.id}">Download (.txt)</button>
          </div>
          ${script.stages.map((stage,i)=>`
            <div class="script-stage">
              <div class="script-stage-num">${String(i+1).padStart(2,'0')}</div>

                <div class="script-stage-title">${escapeHtml(stage.title)}</div>
                <ul class="script-stage-lines">${stage.lines.map(l=>`<li>${linkify(l)}</li>`).join('')}</ul>

  function renderObjectionsTab(){
    const filtered = objectionFilter==='all' ? OBJECTIONS : OBJECTIONS.filter(o=>o.stage===objectionFilter);
    const stageLabel = {all:'All', intro:'Intro / Booking', closing:'Closing', inapp:'In Application'};
    const productLabel = {mp:'Mortgage Protection', fe:'Final Expense', life:'Life', general:'Any product'};
    return `
      <div class="obj-video-banner">
        <span>New to objections? Watch the walkthrough first:</span>
        <a href="https://youtu.be/Uz27aYfKxfI?si=4FXuAd2a6nISRX8Z" target="_blank" rel="noopener">▶ Handling Objections video</a>
      </div>
      <div class="objection-filterbar">
        ${['all','intro','closing','inapp'].map(f=>`<button class="filter-chip ${objectionFilter===f?'active':''}" data-objfilter="${f}">${stageLabel[f]}</button>`).join('')}
        <span class="objection-count">${filtered.length} objection${filtered.length===1?'':'s'}</span>
      </div>
      <div class="objection-grid">
        ${filtered.map(o=>{
          const open = openObjectionId===o.id;
          return `
          <div class="objection-card ${open?'open':''}" data-objtoggle="${o.id}">
            <div class="objection-tag">${stageLabel[o.stage]||'Objection'} · ${productLabel[o.product]||''}</div>
            <div class="objection-text">${escapeHtml(o.text)}</div>
            ${open ? `
              <div class="objection-rebuttal"><strong>Rebuttal —</strong> ${escapeHtml(o.rebuttal)}</div>
              <div class="objection-tip"><strong>Agent tip —</strong> ${escapeHtml(o.tip)}</div>
            ` : `<div class="objection-hint">Tap to see the rebuttal →</div>`}
          </div>`;
        }).join('')}
      </div>
    `;
  }

  function renderQuizTab(){
    if(!activeQuizId){
      return `
        <div class="quiz-grid">
          ${QUIZZES.map(qz=>{
            const result = quizScores[qz.id];
            return `
            <div class="quiz-card">
              <div class="quiz-card-title">${escapeHtml(qz.title)}</div>
              <div class="quiz-card-meta">${qz.questions.length} questions · need 70% to pass</div>
              ${result ? `<div class="quiz-card-result ${result.passed?'pass':'fail'}">${result.score}/${result.total} — ${result.passed?'Passed':'Try again'}</div>` : `<div class="quiz-card-result none">Not taken yet</div>`}
              <button class="footer-nav-btn" data-quizstart="${qz.id}">${result?'Retake quiz':'Start quiz'}</button>
            </div>`;
          }).join('')}
        </div>
      `;
    }

    const quiz = QUIZZES.find(q=>q.id===activeQuizId);

    if(!quizSubmitted){
      const answeredCount = Object.keys(quizAnswers).length;
      return `
        <div class="quiz-runner">
          <button class="reset-link" data-quizback="1">← Back to quizzes</button>
          <h3 class="script-title">${escapeHtml(quiz.title)}</h3>
          ${quiz.questions.map((q,qi)=>`
            <div class="quiz-question">
              <div class="quiz-question-text">${qi+1}. ${escapeHtml(q.q)}</div>
              <div class="quiz-options">
                ${q.options.map((opt,oi)=>`<button class="quiz-option ${quizAnswers[qi]===oi?'selected':''}" data-quizanswer="${qi}:${oi}">${escapeHtml(opt)}</button>`).join('')}
              </div>
            </div>`).join('')}
          <button class="save-btn" id="quizSubmitBtn" ${answeredCount < quiz.questions.length ? 'disabled' : ''}>Submit quiz (${answeredCount}/${quiz.questions.length} answered)</button>
        </div>
      `;
    }

    const result = quizScores[activeQuizId];
    return `
      <div class="quiz-runner">
        <button class="reset-link" data-quizback="1">← Back to quizzes</button>
        <h3 class="script-title">${escapeHtml(quiz.title)} — ${result.score}/${result.total} ${result.passed?'(Passed)':'(Not yet — 70% needed)'}</h3>
        ${quiz.questions.map((q,qi)=>{
          const picked = quizAnswers[qi];
          return `
          <div class="quiz-question">
            <div class="quiz-question-text">${qi+1}. ${escapeHtml(q.q)}</div>
            <div class="quiz-options">
              ${q.options.map((opt,oi)=>{
                let cls = 'quiz-option reviewed';
                if(oi===q.correct) cls += ' correct';
                else if(oi===picked) cls += ' incorrect';
                return `<div class="${cls}">${escapeHtml(opt)}</div>`;
              }).join('')}
            </div>
            <div class="quiz-explain">${escapeHtml(q.explain)}</div>
          </div>`;
        }).join('')}
        <button class="footer-nav-btn" data-quizretry="${quiz.id}">Retake this quiz</button>
      </div>
    `;
  }

  function downloadScript(scriptId){
    const script = SCRIPTS.find(s=>s.id===scriptId);
    if(!script) return;
    let text = script.title.toUpperCase()+'\n'+script.subtitle+'\n'+'='.repeat(40)+'\n\n';
    script.stages.forEach((stage,i)=>{
      text += (i+1)+'. '+stage.title.toUpperCase()+'\n';
      stage.lines.forEach(l=> text += '   - '+l+'\n');
      text += '\n';
    });
    try{
      const blob = new Blob([text], {type:'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = script.title.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){ console.error('Download failed', e); }
  }

  function renderOrgEditPanel(){
    return `
      <div class="edit-panel">
        <div>
          <span class="row-label">Upline name</span>
          <input id="orgMentorName" value="${escapeAttr(orgInfo.mentorName)}" />
        </div>
        <div>
          <span class="row-label">Phone</span>
          <input id="orgMentorPhone" value="${escapeAttr(orgInfo.mentorPhone)}" />
        </div>
        <div>
          <span class="row-label">Email</span>
          <input id="orgMentorEmail" value="${escapeAttr(orgInfo.mentorEmail)}" />
        </div>
        <div>
          <span class="row-label">Agency / IMO name</span>
          <input id="orgAgencyName" value="${escapeAttr(orgInfo.agencyName)}" />
        </div>
        <div>
          <span class="row-label">CRM name (shown in Phase 03)</span>
          <input id="orgCrmName" value="${escapeAttr(orgInfo.crmName)}" />
        </div>
        <div>
          <span class="row-label">Starter carriers (shown in Phase 02)</span>
          <input id="orgCarriers" value="${escapeAttr(orgInfo.carriers)}" />
        </div>
        <div>
          <span class="row-label">Xcel course link (Phase 01)</span>
          <input id="orgCourseLink" value="${escapeAttr(orgInfo.courseLink)}" />
        </div>
        <div>
          <span class="row-label">Xcel partner code — free course (Phase 01)</span>
          <input id="orgPartnerCode" value="${escapeAttr(orgInfo.coursePartnerCode)}" />
        </div>
        <div>
          <span class="row-label">Fingerprinting link — IdentoGO (Phase 01)</span>
          <input id="orgFingerprintLink" value="${escapeAttr(orgInfo.fingerprintLink)}" />
        </div>
        <div class="note">Visible to everyone who opens this manual — update it once and every downline sees it.</div>
        <button class="save-btn" id="saveOrgBtn">Save</button>
      </div>
    `;
  }

  function escapeHtml(str){
    return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  // ---------------- Event handlers ----------------
  function attachHandlers(){
    document.querySelectorAll('[data-mode]').forEach(btn=>{
      btn.onclick = ()=>{ viewMode = btn.getAttribute('data-mode'); render(); window.scrollTo({top:0,behavior:'smooth'}); };
    });

    document.querySelectorAll('[data-ttab]').forEach(btn=>{
      btn.onclick = ()=>{ trainingTab = btn.getAttribute('data-ttab'); render(); };
    });

    document.querySelectorAll('[data-script]').forEach(btn=>{
      btn.onclick = ()=>{ activeScriptId = btn.getAttribute('data-script'); render(); };
    });

    document.querySelectorAll('[data-scriptdownload]').forEach(btn=>{
      btn.onclick = ()=> downloadScript(btn.getAttribute('data-scriptdownload'));
    });

    document.querySelectorAll('[data-objfilter]').forEach(btn=>{
      btn.onclick = ()=>{ objectionFilter = btn.getAttribute('data-objfilter'); openObjectionId = null; render(); };
    });

    document.querySelectorAll('[data-objtoggle]').forEach(card=>{
      card.onclick = ()=>{
        const id = card.getAttribute('data-objtoggle');
        openObjectionId = (openObjectionId === id) ? null : id;
        render();
      };
    });

    document.querySelectorAll('[data-quizstart]').forEach(btn=>{
      btn.onclick = ()=>{ activeQuizId = btn.getAttribute('data-quizstart'); quizAnswers = {}; quizSubmitted = false; render(); };
    });

    document.querySelectorAll('[data-quizback]').forEach(btn=>{
      btn.onclick = ()=>{ activeQuizId = null; quizAnswers = {}; quizSubmitted = false; render(); };
    });

    document.querySelectorAll('[data-quizretry]').forEach(btn=>{
      btn.onclick = ()=>{ activeQuizId = btn.getAttribute('data-quizretry'); quizAnswers = {}; quizSubmitted = false; render(); };
    });

    document.querySelectorAll('[data-quizanswer]').forEach(btn=>{
      btn.onclick = ()=>{
        const [qi, oi] = btn.getAttribute('data-quizanswer').split(':').map(Number);
        quizAnswers[qi] = oi;
        render();
      };
    });

    const quizSubmitBtn = document.getElementById('quizSubmitBtn');
    if(quizSubmitBtn) quizSubmitBtn.onclick = async ()=>{
      const quiz = QUIZZES.find(q=>q.id===activeQuizId);
      if(!quiz) return;
      let score = 0;
      quiz.questions.forEach((q,qi)=>{ if(quizAnswers[qi]===q.correct) score++; });
      const total = quiz.questions.length;
      const passed = (score/total) >= 0.7;
      quizScores[activeQuizId] = {score, total, passed, date:new Date().toISOString()};
      quizSubmitted = true;
      await saveJSON('quiz-scores', quizScores, false);
      render();
    };

    const pencil = document.getElementById('editPencil');
    if(pencil) pencil.onclick = ()=>{ editingOrg = !editingOrg; render(); };

    const saveOrgBtn = document.getElementById('saveOrgBtn');
    if(saveOrgBtn) saveOrgBtn.onclick = async ()=>{
      orgInfo.mentorName = document.getElementById('orgMentorName').value.trim();
      orgInfo.mentorPhone = document.getElementById('orgMentorPhone').value.trim();
      orgInfo.mentorEmail = document.getElementById('orgMentorEmail').value.trim();
      orgInfo.agencyName = document.getElementById('orgAgencyName').value.trim();
      orgInfo.crmName = document.getElementById('orgCrmName').value.trim() || 'PolicyTek';
      orgInfo.carriers = document.getElementById('orgCarriers').value.trim() || 'Aetna, Americo, and Ethos';
      orgInfo.courseLink = document.getElementById('orgCourseLink').value.trim();
      orgInfo.coursePartnerCode = document.getElementById('orgPartnerCode').value.trim();
      orgInfo.fingerprintLink = document.getElementById('orgFingerprintLink').value.trim();
      editingOrg = false;
      await saveJSON('org-info', orgInfo, true);
      render();
    };

    const saveNameBtn = document.getElementById('saveNameBtn');
    if(saveNameBtn) saveNameBtn.onclick = async ()=>{
      const val = document.getElementById('nameInput').value.trim();
      if(val){
        progress.name = val;
        await saveJSON('progress', progress, false);
        render();
      }
    };

    document.querySelectorAll('[data-jump]').forEach(chip=>{
      chip.onclick = ()=>{
        const stepId = chip.getAttribute('data-jump');
        activePhase = STEP_PHASE_INDEX[stepId] ?? activePhase;
        openStep = stepId;
        render();
        window.scrollTo({top:0,behavior:'smooth'});
      };
    });

    document.querySelectorAll('[data-phase]').forEach(btn=>{
      btn.onclick = ()=>{ activePhase = parseInt(btn.getAttribute('data-phase'),10); openStep=null; render(); };
    });

    document.querySelectorAll('[data-dailytoggle]').forEach(row=>{
      row.onclick = (e)=>{
        if(e.target.closest('[data-dailycheck]')) return;
        const id = row.getAttribute('data-dailytoggle');
        openStep = (openStep === id) ? null : id;
        render();
      };
    });

    document.querySelectorAll('[data-dailycheck]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const id = btn.getAttribute('data-dailycheck');
        dailyChecks[id] = !dailyChecks[id];
        await saveDaily();
        render();
      };
    });

    const resetDaily = document.getElementById('resetDailyBtn');
    if(resetDaily) resetDaily.onclick = async ()=>{ dailyChecks = {}; await saveDaily(); render(); };

    document.querySelectorAll('[data-toggle]').forEach(row=>{
      row.onclick = (e)=>{
        if(e.target.closest('[data-check]')) return;
        const id = row.getAttribute('data-toggle');
        openStep = (openStep === id) ? null : id;
        render();
      };
    });

    document.querySelectorAll('[data-check]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const id = btn.getAttribute('data-check');
        progress.completed[id] = !progress.completed[id];
        await saveJSON('progress', progress, false);
        render();
      };
    });

    document.querySelectorAll('[data-note]').forEach(area=>{
      area.onblur = async ()=>{
        const id = area.getAttribute('data-note');
        progress.notes[id] = area.value;
        await saveJSON('progress', progress, false);
      };
    });

    const prevBtn = document.getElementById('prevPhase');
    if(prevBtn) prevBtn.onclick = ()=>{ activePhase--; openStep=null; render(); window.scrollTo({top:0,behavior:'smooth'}); };
    const nextBtn = document.getElementById('nextPhase');
    if(nextBtn) nextBtn.onclick = ()=>{ activePhase++; openStep=null; render(); window.scrollTo({top:0,behavior:'smooth'}); };

    const resetBtn = document.getElementById('resetBtn');
    if(resetBtn) resetBtn.onclick = async ()=>{
      if(confirm('Reset all of your checked steps and notes? This cannot be undone.')){
        progress = { name: progress.name, completed:{}, notes:{} };
        await saveJSON('progress', progress, false);
        render();
      }
    };
  }

  // ---------------- Init ----------------
  async function init(){
    const [loadedOrg, loadedProgress, loadedScores, loadedDaily] = await Promise.all([
      loadJSON('org-info', true, orgInfo),
      loadJSON('progress', false, progress),
      loadJSON('quiz-scores', false, {}),
      loadJSON('daily-checks', false, {date:'', checks:{}}),
    ]);
    orgInfo = loadedOrg;
    progress = Object.assign({ name:'', completed:{}, notes:{} }, loadedProgress);
    quizScores = loadedScores || {};
    // Daily checklist resets automatically on a new calendar day.
    const today = new Date().toDateString();
    if(loadedDaily && loadedDaily.date === today){
      dailyChecks = loadedDaily.checks || {};
    } else {
      dailyChecks = {};
    }
    render();
  }

  async function saveDaily(){
    try{ await saveJSON('daily-checks', {date:new Date().toDateString(), checks:dailyChecks}, false); }
    catch(e){ console.error('daily save failed', e); }
  }

  init();
})();
</script>
